      #     mkdir -p ~/.ssh
      #     printf '%s' "${{ secrets.RUNNER_USER_KEY }}" > ~/.ssh/id_ed25519
      #     chmod 600 ~/.ssh/id_ed25519
      #     ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts
      #     chmod 644 ~/.ssh/known_hosts
