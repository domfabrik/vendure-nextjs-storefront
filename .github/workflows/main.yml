name: Domfabric Storefront CI/CD

on:
  push:
    branches:
      - main
      - test
  pull_request:
    branches:
      - main
      - test
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - prod
          - test

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint if present
        run: npm run lint --if-present
      - name: Run tests if present
        run: npm test --if-present

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        id: vars
        shell: bash
        env:
          YC_REGISTRY: ${{ vars.YC_REGISTRY }}
          STOREFRONT_IMAGE_REPOSITORY: ${{ vars.STOREFRONT_IMAGE_REPOSITORY }}
          PROD_SERVER_HOST: ${{ vars.PROD_SERVER_HOST }}
          TEST_SERVER_HOST: ${{ vars.TEST_SERVER_HOST }}
          PROD_DEPLOY_ENV_FILE: ${{ vars.PROD_DEPLOY_ENV_FILE }}
          TEST_DEPLOY_ENV_FILE: ${{ vars.TEST_DEPLOY_ENV_FILE }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_env="${{ inputs.environment }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            deploy_env="prod"
          else
            deploy_env="test"
          fi

          if [[ "${deploy_env}" == "prod" ]]; then
            server_host="${PROD_SERVER_HOST}"
            deploy_env_file="${PROD_DEPLOY_ENV_FILE}"
            latest_tag="prod-latest"
          else
            server_host="${TEST_SERVER_HOST}"
            deploy_env_file="${TEST_DEPLOY_ENV_FILE}"
            latest_tag="test-latest"
          fi

          version="$(node -p "require('./package.json').version")"
          build_date="$(date +'%Y-%m-%d')"
          short_sha="$(git rev-parse --short HEAD)"
          image_tag="${deploy_env}-v${version}-${build_date}-${short_sha}"
          image_repo="${YC_REGISTRY}/${STOREFRONT_IMAGE_REPOSITORY}"
          public_origin="https://${server_host}"

          echo "server_host=${server_host}" >> "$GITHUB_OUTPUT"
          echo "deploy_env_file=${deploy_env_file}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "public_origin=${public_origin}" >> "$GITHUB_OUTPUT"

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build storefront image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --build-arg "NEXT_PUBLIC_HOST=${{ steps.vars.outputs.public_origin }}" \
            --build-arg "NEXT_PUBLIC_DOMAIN=${{ steps.vars.outputs.public_origin }}" \
            -t "${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.image_tag }}" \
            -t "${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.latest_tag }}" \
            .

      - name: Push storefront image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.image_tag }}"
          docker push "${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.latest_tag }}"

      # Manual server rollout is temporarily preferred while the deploy scripts
      # are validated directly on the target VM. Re-enable SSH deploy after the
      # server-side path is proven stable.
